<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Home</title>
    <style>
        body {
            font-family: 'Roboto', Arial, sans-serif;
            margin: 0;
            padding: 0;
            background-color: #e8eff6;
            color: #333;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            box-sizing: border-box;
        }

        .container {
            text-align: center;
            margin-top: 50px;
            padding: 20px;
            width: 100%;
            max-width: 1200px;
        }

        h1 {
            font-size: 2rem;
            margin-bottom: 30px;
            color: #0056b3;
        }

        .button-container {
            display: flex;
            gap: 20px;
            flex-wrap: wrap;
            justify-content: center;
        }

        .button {
            background-color: #0056b3;
            color: #fff;
            border: none;
            border-radius: 5px;
            padding: 15px 30px;
            font-size: 1rem;
            cursor: pointer;
            transition: background-color 0.3s ease;
            text-transform: uppercase;
            text-decoration: none;
            display: inline-block;
        }

        .button:hover {
            background-color: #003d80;
        }

        .button:active {
            background-color: #002d60;
        }

        footer {
            margin-top: auto;
            padding: 20px 0;
            text-align: center;
            font-size: 0.875rem;
            color: #555;
        }

        /* Responsive Adjustments */
        @media (max-width: 768px) {
            h1 {
                font-size: 1.75rem;
            }

            .button {
                padding: 12px 25px;
                font-size: 0.9rem;
            }

            .button-container {
                gap: 15px;
            }
        }

        @media (max-width: 480px) {
            h1 {
                font-size: 1.5rem;
            }

            .button {
                padding: 10px 20px;
                font-size: 0.8rem;
            }

            footer {
                font-size: 0.8rem;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>Welcome, Admin</h1>
        <div class="button-container">
            <a href="{% url 'addproduct' %}" class="button">Add Product</a>
            <a href="{% url 'productionhistory' %}" class="button">Production History</a>
            <a href="{% url 'invoicelist' %}" class="button">Invoice List</a>
        </div>
    </div>
    <footer>
        © 2025 PayTrack. All rights reserved.
    </footer>
</body>
</html>
